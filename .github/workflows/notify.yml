name: Notify Telegram

on:
  push:
    branches: ['**']
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  notify:
    name: Notify
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"
          EVENT="${{ github.event_name }}"
          REPO_NAME=$(echo "$REPO" | cut -d/ -f2)

          if [ "$EVENT" = "push" ]; then
            BRANCH="${{ github.ref_name }}"
            SHORT_SHA="${{ github.sha }}"
            SHORT_SHA="${SHORT_SHA:0:7}"
            COMMIT_MSG=$(echo '${{ github.event.head_commit.message }}' | head -1 | cut -c1-80)
            COMMITS="${{ github.event.commits.length }}"
            COMPARE_URL="${{ github.event.compare }}"
            MESSAGE="📦 *${REPO_NAME}* — new push%0A%0A*Branch:* \`${BRANCH}\`%0A*By:* \`${ACTOR}\`%0A*Commit:* [\`${SHORT_SHA}\`](${COMPARE_URL}) ${COMMIT_MSG}%0A*Total:* ${COMMITS} commit(s)"

          elif [ "$EVENT" = "pull_request" ]; then
            PR_NUM="${{ github.event.pull_request.number }}"
            PR_TITLE="${{ github.event.pull_request.title }}"
            PR_URL="${{ github.event.pull_request.html_url }}"
            ACTION="${{ github.event.action }}"
            MERGED="${{ github.event.pull_request.merged }}"

            if [ "$ACTION" = "closed" ] && [ "$MERGED" = "true" ]; then
              EMOJI="🔀"
              LABEL="merged"
            elif [ "$ACTION" = "closed" ]; then
              EMOJI="🚫"
              LABEL="closed"
            elif [ "$ACTION" = "opened" ]; then
              EMOJI="🔁"
              LABEL="opened"
            else
              EMOJI="🔄"
              LABEL="updated"
            fi

            MESSAGE="${EMOJI} *${REPO_NAME}* — PR ${LABEL}%0A%0A[#${PR_NUM} ${PR_TITLE}](${PR_URL})%0A*By:* \`${ACTOR}\`"
          fi

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=-1003750230285" \
            -d "message_thread_id=459" \
            -d "parse_mode=Markdown" \
            -d "disable_web_page_preview=true" \
            -d "text=${MESSAGE}"
