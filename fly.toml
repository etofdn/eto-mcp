app = "eto-mcp"
primary_region = "sjc"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[env]
  NODE_ENV = "development"
  PORT = "8080"
  NETWORK = "testnet"
  LOG_LEVEL = "info"
  ETO_RPC_URL = "https://perth-certain-consensus-prison.trycloudflare.com"
  AUTH_DEV_BYPASS = "false"
